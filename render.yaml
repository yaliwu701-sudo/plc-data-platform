# Render.com 一键部署配置（使用 Docker）
# 在 Render 控制台选择 "New +" -> "Web Service" -> 连接仓库，Render 会自动读取此文件。
services:
  - type: web
    name: plc-data-platform
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: PLC_MODE
        value: mock
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: "plc@Render2026!"
